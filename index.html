<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bank App</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="bankApp.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Bank App</h2>
        <!-- Balance -->
        <div class="card p-3 text-center">
            <h4>Balance: &#8377; <span id="balance">0</span></h4>
        </div>
        <!-- Form -->
        <div class="card p-3 mt-3">
            <input type="text"
                   id="desc"
                   class="form-control mb-2"
                   placeholder="Description">
            <input type="number"
                   id="amount"
                   class="form-control mb-2"
                   placeholder="Amount">
            <button class="btn btn-success"
                    onclick="addIncome()">
                Add Income
            </button>
            <button class="btn btn-danger mt-2"
                    onclick="addExpense()">
                Add Expense
            </button>
        </div>
        <!-- Summary -->
        <div class="row mt-3 text-center">
            <div class="col-md-6">
                <div class="card p-3">
                    <h5>Total Income</h5>
                    <h4 class="text-success">
                        &#8377; <span id="income">0</span>
                    </h4>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h5>Total Expense</h5>
                    <h4 class="text-danger">
                        &#8377; <span id="expense">0</span>
                    </h4>
                </div>
            </div>
        </div>
        <!-- Transactions -->
        <div class="row mt-3">
            <!-- Income List -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-success">
                        Income Transactions
                    </h5>
                    <ul id="incomeList"
                        class="list-group">
                    </ul>
                </div>
            </div>
            <!-- Expense List -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="text-danger">
                        Expense Transactions
                    </h5>
                    <ul id="expenseList"
                        class="list-group">
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="bankApp.js"></script>
</body>
</html>
